<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>社会用語マスター 完全版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;
  background:#020617;color:#f1f5f9;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:8px;overflow-x:hidden;
}
.card{
  width:100%;max-width:640px;background:#0f172a;
  border-radius:2.5rem;border:1px solid #1e293b;
  box-shadow:0 0 80px rgba(0,0,0,.6);overflow:hidden;position:relative;
}
/* Header */
.hdr{
  background:#1e293b;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid #1e293b;position:relative;z-index:10;
}
.hdr-left{display:flex;align-items:center;gap:10px;}
.rank-name{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;}
.master-cnt{font-size:12px;font-weight:900;color:#f1f5f9;}
.hdr-right{display:flex;gap:6px;}
.badge{
  background:#020617;border:1px solid #1e293b;
  padding:5px 10px;border-radius:10px;font-size:11px;font-weight:700;
  display:flex;align-items:center;gap:4px;font-family:monospace;color:#f1f5f9;
}
.back-btn{
  width:38px;height:38px;background:#334155;border:1px solid #475569;
  border-radius:10px;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  -webkit-user-select:none;
}
.back-btn:active{background:#475569;transform:scale(.9);}
/* Screen */
.screen{padding:20px;min-height:500px;display:flex;flex-direction:column;justify-content:center;}
@media(min-width:600px){.screen{padding:40px;}}
/* Fade animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .25s ease-out both;}
/* Title */
.title-h1{
  font-size:clamp(1.8rem,7vw,2.8rem);font-weight:900;font-style:italic;
  background:linear-gradient(135deg,#60a5fa,#818cf8,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.02em;line-height:1.1;text-align:center;margin-bottom:8px;
}
.title-sub{
  display:inline-block;background:#1e293b;border:1px solid #334155;
  padding:4px 14px;border-radius:999px;font-size:11px;font-weight:700;
  margin-bottom:16px;
}
/* Progress */
.prog-wrap{background:#1e293b;border:1px solid #1e293b;border-radius:16px;padding:14px;margin:0 0 16px;}
.prog-top{display:flex;justify-content:space-between;font-size:10px;font-weight:900;
  text-transform:uppercase;letter-spacing:.1em;color:#64748b;margin-bottom:6px;}
.prog-bar{height:10px;background:#020617;border-radius:999px;overflow:hidden;border:1px solid #1e293b;}
.prog-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#34d399);border-radius:999px;transition:width .6s;}
.prog-bot{display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-top:6px;}
/* Range selector */
.sec-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;
  color:#475569;text-align:center;margin-bottom:8px;}
.range-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:18px;}
.rng{
  padding:10px 4px;border-radius:12px;font-size:10px;font-weight:900;cursor:pointer;
  border:1px solid #334155;background:#1e293b;color:#94a3b8;text-align:center;
  -webkit-user-select:none;transition:background .1s;
}
.rng:active{transform:scale(.95);}
.rng.on{background:#1d4ed8;border-color:#60a5fa;color:#fff;}
.rng .cnt{font-size:9px;opacity:.6;margin-top:2px;}
/* Buttons */
.btn{
  width:100%;padding:16px;border-radius:1.5rem;font-size:15px;font-weight:900;
  text-transform:uppercase;letter-spacing:.1em;cursor:pointer;border:none;color:#fff;
  -webkit-user-select:none;transition:transform .1s;
}
.btn:active{transform:scale(.96);}
.btn-blue{background:#2563eb;}
.btn-red{background:#dc2626;}
.btn-ghost{
  background:none;border:none;color:#475569;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;cursor:pointer;padding:8px;
  width:100%;margin-top:4px;
}
.btn-ghost:active{color:#f1f5f9;}
/* HP bar */
.hp-wrap{margin-bottom:18px;}
.hp-lbl{display:flex;justify-content:space-between;font-size:10px;font-weight:900;
  text-transform:uppercase;letter-spacing:.15em;color:#64748b;margin-bottom:5px;}
.hp-val{color:#ef4444;}
.hp-bar{height:10px;background:#020617;border-radius:999px;overflow:hidden;border:1px solid #1e293b;padding:2px;}
.hp-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#dc2626,#ea580c,#facc15);transition:width .5s;}
/* Question */
.q-meta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.q-tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:900;}
.tag-week{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2);}
.tag-cat{background:rgba(139,92,246,.1);color:#a78bfa;border:1px solid rgba(139,92,246,.2);}
.q-num{font-size:10px;font-weight:900;color:#475569;text-transform:uppercase;letter-spacing:.1em;}
.q-text{
  font-size:clamp(1rem,3.5vw,1.2rem);font-weight:900;line-height:1.7;
  min-height:4.5rem;margin-bottom:18px;color:#f1f5f9;
}
/* Options */
.opts{display:grid;grid-template-columns:1fr;gap:8px;}
@media(min-width:480px){.opts{grid-template-columns:1fr 1fr;}}
.opt{
  padding:14px 16px;text-align:left;background:rgba(30,41,59,.5);
  border:1px solid #334155;border-radius:20px;font-size:13px;font-weight:700;
  cursor:pointer;color:#f1f5f9;-webkit-user-select:none;transition:background .1s;
  line-height:1.4;
}
.opt:active{background:#1e293b;transform:scale(.97);}
/* Result panel */
.result-panel{padding:18px;border-radius:2rem;border:2px solid;margin-bottom:14px;}
.result-panel.ok{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.35);}
.result-panel.ng{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.35);}
.result-top{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.result-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0;}
.result-icon.ok{background:rgba(16,185,129,.2);}
.result-icon.ng{background:rgba(239,68,68,.2);}
.result-word{font-size:2rem;font-weight:900;letter-spacing:-.02em;}
.result-word.ok{color:#34d399;}
.result-word.ng{color:#f87171;}
.result-ans{font-size:15px;font-weight:700;margin-bottom:10px;}
.result-ans em{
  background:#1d4ed8;color:#fff;padding:2px 10px;border-radius:7px;
  font-style:normal;
}
.result-exp{
  font-size:12px;color:#94a3b8;font-style:italic;line-height:1.8;
  background:rgba(2,6,23,.5);padding:12px;border-radius:14px;
  border:1px solid #1e293b;margin-bottom:14px;
}
.btn-next{
  width:100%;padding:14px;background:#fff;color:#0f172a;border:none;
  border-radius:14px;font-size:11px;font-weight:900;text-transform:uppercase;
  letter-spacing:.1em;cursor:pointer;-webkit-user-select:none;
}
.btn-next:active{background:#eff6ff;transform:scale(.97);}
/* Start screen */
.boss-wrap{text-align:center;margin-bottom:14px;}
.boss-emoji{font-size:88px;display:inline-block;animation:bns 1s ease-in-out infinite;}
@keyframes bns{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.battle-h{font-size:1.8rem;font-weight:900;font-style:italic;text-transform:uppercase;
  color:#ef4444;text-align:center;letter-spacing:-.02em;margin-bottom:6px;}
.battle-sub{color:#94a3b8;font-size:13px;text-align:center;margin-bottom:4px;}
.battle-range{color:#475569;font-size:11px;text-align:center;margin-bottom:20px;}
.battle-range strong{color:#60a5fa;}
/* Battle result */
.result-big{text-align:center;}
.big-emoji{font-size:88px;position:relative;display:inline-block;margin-bottom:12px;}
.clear-tag{
  position:absolute;top:-10px;right:-32px;background:#eab308;color:#0f172a;
  font-size:9px;font-weight:900;padding:3px 10px;border-radius:999px;
  transform:rotate(12deg);border:2px solid #020617;
}
.result-h{
  font-size:1.8rem;font-weight:900;font-style:italic;text-transform:uppercase;
  background:linear-gradient(135deg,#60a5fa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-.02em;margin-bottom:14px;
}
.score-box{
  background:rgba(30,41,59,.6);border:1px solid #1e293b;
  border-radius:16px;padding:16px;max-width:280px;margin:0 auto 20px;
}
.score-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;text-align:center;}
.score-n{font-size:1.6rem;font-weight:900;}
.score-l{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.score-div{border-top:1px solid #1e293b;margin-top:10px;padding-top:10px;
  font-size:11px;color:#475569;}
.score-div strong{color:#60a5fa;}
.btn-again{
  width:100%;max-width:280px;padding:15px;background:#1d4ed8;color:#fff;border:none;
  border-radius:2rem;font-size:12px;font-weight:900;text-transform:uppercase;
  letter-spacing:.1em;cursor:pointer;margin:0 auto;display:block;
}
.btn-again:active{transform:scale(.96);}
/* VFX */
.vfx{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.vfx1,.vfx2{
  position:absolute;width:100%;height:100%;border-radius:50%;
  animation:pls 3s ease-in-out infinite;
}
.vfx1{background:rgba(29,78,216,.12);top:-25%;left:-25%;filter:blur(120px);}
.vfx2{background:rgba(109,40,217,.12);bottom:-25%;right:-25%;filter:blur(120px);animation-delay:1.5s;}
@keyframes pls{0%,100%{opacity:.3}50%{opacity:.5}}
</style>
</head>
<body>
<div class="card">
  <div class="vfx"><div class="vfx1"></div><div class="vfx2"></div></div>
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-left">
      <button class="back-btn" id="backBtn" style="display:none" id="backBtn">🏠</button>
      <div>
        <div class="rank-name" id="rankName" style="color:#94a3b8">有権者の見習い</div>
        <div class="master-cnt" id="masterCnt">制覇: 0 / 396</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="badge">🕐 <span id="timerDisp">0s</span></div>
      <div class="badge">⭐ <span id="scoreDisp">0pt</span></div>
    </div>
  </div>
  <!-- Screen -->
  <div class="screen" id="screen"></div>
</div>

: "小選挙区289＋比例176。"}, {"id": "tp_k11", "week": "テスト対策", "category": "知識のチェック", "q": "参議院議員の任期は何年ですか。", "a": "6年", "explain": "3年ごとに半数改選。"}, {"id": "tp_k12", "week": "テスト対策", "category": "知識のチェック", "q": "毎年1月に召集される国会を何といいますか。漢字で答えなさい。", "a": "通常国会（常会）", "explain": "会期150日。"}, {"id": "tp_k13", "week": "テスト対策", "category": "知識のチェック", "q": "衆議院の総選挙後に開かれる特別国会においては何の指名が行われますか。", "a": "内閣総理大臣の指名", "explain": "特別国会の主な仕事。"}, {"id": "tp_k14", "week": "テスト対策", "category": "知識のチェック", "q": "国会の主な仕事は法律の制定と、もう一つは何ですか。「〜の議決」という形で答えなさい。", "a": "予算の議決", "explain": "財政に関する権限。"}, {"id": "tp_k15", "week": "テスト対策", "category": "知識のチェック", "q": "国会に法律案を提出できる組織はどこですか。漢字で答えなさい。", "a": "内閣（と国会議員）", "explain": "内閣・国会議員が提出可。"}, {"id": "tp_k16", "week": "テスト対策", "category": "知識のチェック", "q": "内閣不信任案が可決されたとき、内閣は何日以内に衆議院の解散か、総辞職を決定しますか。", "a": "10日以内", "explain": "第69条。"}, {"id": "tp_k17", "week": "テスト対策", "category": "知識のチェック", "q": "衆議院だけが持つ権限は二つあります。一つは予算の先議権です。もう一つは何の決議をしますか。漢字で答えなさい。", "a": "内閣不信任案の決議", "explain": "衆議院の優越。"}, {"id": "tp_k18", "week": "テスト対策", "category": "知識のチェック", "q": "法律案などを審議する過程で、大学教授などの専門家を招いて意見を聞く会を何といいますか。", "a": "公聴会", "explain": "専門意見の聴取。"}, {"id": "tp_k19", "week": "テスト対策", "category": "知識のチェック", "q": "国会議員全員が出席する場を何といいますか。漢字で答えなさい。", "a": "本会議", "explain": "最終議決の場。"}, {"id": "tp_k20", "week": "テスト対策", "category": "知識のチェック", "q": "国会において、衆参両院の意見が一致しなかったときに開かれる会を何といいますか。漢字で答えなさい。", "a": "両院協議会", "explain": "意見調整の場。"}, {"id": "tp_k21", "week": "テスト対策", "category": "知識のチェック", "q": "政権に入っておらず、政権に反対することが多い政党を何といいますか。漢字で答えなさい。", "a": "野党", "explain": "与党の対義語。"}, {"id": "tp_k22", "week": "テスト対策", "category": "知識のチェック", "q": "2026年3月現在の内閣総理大臣は誰ですか。人物名を漢字で答えなさい。", "a": "高市早苗", "explain": "自民党。"}, {"id": "tp_k23", "week": "テスト対策", "category": "知識のチェック", "q": "国会と内閣が連帯責任を負うしくみを何といいますか。", "a": "議院内閣制", "explain": "第66条。"}, {"id": "tp_k24", "week": "テスト対策", "category": "知識のチェック", "q": "日本国憲法第66条において、内閣総理大臣や国務大臣は何でなければならないと規定されていますか。漢字二字で答えなさい。", "a": "文民", "explain": "シビリアン・コントロール function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function h(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function getType(t) {
  if (/^\d+名$/.test(t)) return 'np';
  if (/^\d+日以内$/.test(t)) return 'nd';
  if (/^\d+歳/.test(t)) return 'na';
  if (/\d+分の/.test(t)||t==='過半数') return 'rt';
  if (/^\d{4}年/.test(t)) return 'yr';
  if (/^第\d+条$/.test(t)) return 'ar';
  if (t.slice(-1)==='法'||t.slice(-2)==='主義') return 'lw';
  if (t.slice(-2)==='大臣'||t.slice(-1)==='省'||t.slice(-1)==='庁') return 'og';
  return 'gn';
}

function getOptions(correct) {
  var type = getType(correct);
  var all = [];
  var seen = {};
  for (var i=0; i<QB.length; i++) {
    var a = QB[i].a;
    if (!seen[a]) { seen[a]=1; all.push(a); }
  }
  var same = [], other = [];
  for (var i=0; i<all.length; i++) {
    if (all[i]===correct) continue;
    if (getType(all[i])===type) same.push(all[i]);
    else other.push(all[i]);
  }
  same = shuffle(same);
  other = shuffle(other);
  var pool = same.length>=3 ? same : same.concat(other);
  return shuffle([correct].concat(pool.slice(0,3)));
}

function getRank() {
  var n = progress.masteredIds.length;
  if (n>=TOTAL) return {name:'社会マスター👑',color:'#facc15'};
  if (n>=300)   return {name:'最高裁長官',color:'#f87171'};
  if (n>=200)   return {name:'内閣総理大臣',color:'#fb923c'};
  if (n>=100)   return {name:'国会議員',color:'#60a5fa'};
  if (n>=50)    return {name:'選挙権保有者',color:'#34d399'};
  return {name:'有権者の見習い',color:'#94a3b8'};
}

  var bb = document.getElementById('backBtn');
  var sd = document.getElementById('scoreDisp');
  if (rn) { rn.textContent = r.name; rn.style.color = r.color; }
  if (mc) mc.textContent = '制覇: '+progress.masteredIds.length+' / '+TOTAL;
  if (bb) bb.style.display = gameState==='TITLE' ? 'none' : 'flex';
  if (sd) sd.textContent = score+'pt';
}

function startTimer() {
  stopTimer();
  timerObj = setInterval(function() {
    timerVal++;
    var td = document.getElementById('timerDisp');
    if (td) td.textContent = timerVal+'s';
  }, 1000);
}

function stopTimer() {
  if (timerObj) { clearInterval(timerObj); timerObj = null; }
}

// ==============================
// RENDER
// ==============================
function render() {
  updateHeader();
  var el = document.getElementById('screen');
  if (!el) return;
  el.className = 'screen';
  var html = '';
  if      (gameState==='TITLE')  html = renderTitle();
  else if (gameState==='START')  html = renderStart();
  else if (gameState==='QUIZ')   html = renderQuiz();
  else if (gameState==='RESULT') html = renderResult();
  el.innerHTML = html;
  // Force reflow for animation
  void el.offsetHeight;
  el.className = 'screen fade-up';
  // Attach events after innerHTML set
  attachEvents();
}

function attachEvents() {
  // Back button
  var bb = document.getElementById('backBtn');
  if (bb) bb.onclick = function() {
    if (confirm('ホームへ戻りますか？')) { gameState='TITLE'; stopTimer(); render(); }
  };
  // Range buttons
  var rbtns = document.querySelectorAll('.rng');
  for (var i=0; i<rbtns.length; i++) {
    (function(btn) {
      btn.onclick = function() { selectedRange = btn.getAttribute('data-w'); render(); };
    })(rbtns[i]);
  }
  // Battle start / go next
  var bStart = document.getElementById('btnStart');
  if (bStart) bStart.onclick = startBattle;
  var bNext = document.getElementById('btnNext');
  if (bNext) bNext.onclick = goNext;
  var bAgain = document.getElementById('btnAgain');
  if (bAgain) bAgain.onclick = startBattle;
  var bHome = document.getElementById('btnHome');
  if (bHome) bHome.onclick = function() { gameState='TITLE'; stopTimer(); render(); };
  var bReset = document.getElementById('btnReset');
  if (bReset) bReset.onclick = resetProg;
  // Option buttons — use data-idx, look up from curOptions array
  var opts = document.querySelectorAll('.opt');
  for (var i=0; i<opts.length; i++) {
    (function(btn) {
      btn.onclick = function() {
        var idx = parseInt(btn.getAttribute('data-idx'));
        handleAnswer(curOptions[idx]);
      };
    })(opts[i]);
  }
}

function renderTitle() {
  var pct = Math.round(progress.masteredIds.length/TOTAL*100);
  var fw = progress.masteredIds.length/TOTAL*100;
  var rHtml = '';
  var all = WEEKS.concat(['ALL']);
  for (var i=0; i<all.length; i++) {
    var w = all[i];
    var cnt = w==='ALL' ? TOTAL : QB.filter(function(q){return q.week===w;}).length;
    var on = selectedRange===w ? ' on' : '';
    rHtml += '<div class="rng'+on+'" data-w="'+h(w)+'"><div>'+(w==='ALL'?'全範囲':h(w))+'</div><div class="cnt">'+cnt+'問</div></div>';
  }
  return '<div style="text-align:center">'
    +'<div class="title-h1">社会 知識クエスト</div>'
    +'<div style="text-align:center;margin-bottom:14px"><div class="title-sub">全 '+TOTAL+' 問 完全網羅版</div></div>'
    +'<div class="prog-wrap">'
      +'<div class="prog-top"><span>全体の進捗</span><span>'+pct+'%</span></div>'
      +'<div class="prog-bar"><div class="prog-fill" style="width:'+fw+'%"></div></div>'
      +'<div class="prog-bot"><span>習得: '+progress.masteredIds.length+'問</span><span>苦手: '+progress.incorrectIds.length+'問</span></div>'
    +'</div>'
    +'<div class="sec-label">出題範囲を選択</div>'
    +'<div class="range-grid">'+rHtml+'</div>'
    +'<button class="btn btn-blue" id="btnStart">バトル準備完了</button>'
    +'<button class="btn-ghost" id="btnReset">⟳ 進捗をリセット</button>'
    +'</div>';
}

function renderStart() {
  var rLabel = selectedRange==='ALL' ? '全範囲' : selectedRange;
  return '<div style="text-align:center">'
    +'<div class="boss-wrap"><span class="boss-emoji">👹</span></div>'
    +'<div class="battle-h">VS 忘却の魔王</div>'
    +'<div class="battle-sub">1バトル10問。'+TOTAL+'問の知識で魔王を粉砕せよ。</div>'
    +'<div class="battle-range">範囲: <strong>'+h(rLabel)+'</strong></div>'
    +'<button class="btn btn-red" id="btnStart">BATTLE START ⚔️</button>'
    +'</div>';
}

function renderQuiz() {
  var q = currentQs[curIdx];
  if (!q) return '';
  // Pre-compute options and store globally (key fix for Safari)
  curOptions = getOptions(q.a);

  var optHtml = '';
  for (var i=0; i<curOptions.length; i++) {
    optHtml += '<button class="opt" data-idx="'+i+'">'+h(curOptions[i])+'</button>';
  }

  var hpW = bossHp;
  var html = '<div>'
    +'<div class="hp-wrap">'
      +'<div class="hp-lbl"><span>⚔️ Lord HP</span><span class="hp-val">'+Math.ceil(hpW)+'%</span></div>'
      +'<div class="hp-bar"><div class="hp-fill" style="width:'+hpW+'%"></div></div>'
    +'</div>'
    +'<div class="q-meta">'
      +'<div class="q-tags">'
        +'<span class="tag tag-week">'+h(q.week)+'</span>'
        +'<span class="tag tag-cat">'+h(q.category)+'</span>'
      +'</div>'
      +'<span class="q-num">Q'+(curIdx+1)+' / '+currentQs.length+'</span>'
    +'</div>'
    +'<div class="q-text">'+h(q.q)+'</div>';

  if (!lastResult) {
    html += '<div class="opts">'+optHtml+'</div>';
  } else {
    var ok = lastResult.isCorrect;
    var isLast = curIdx >= currentQs.length - 1;
    html += '<div class="result-panel '+(ok?'ok':'ng')+'">'
      +'<div class="result-top">'
        +'<div class="result-icon '+(ok?'ok':'ng')+'">'+(ok?'⭐':'⚔️')+'</div>'
        +'<div class="result-word '+(ok?'ok':'ng')+'">'+(ok?'HIT!':'BLOCK!')+'</div>'
      +'</div>'
      +'<div class="result-ans">正解: <em>'+h(lastResult.correct)+'</em></div>'
      +'<div class="result-exp">'+h(lastResult.explain)+'</div>'
      +'<button class="btn-next" id="btnNext">'+(isLast?'結果を見る 🏆':'次へ進む →')+'</button>'
      +'</div>';
  }
  html += '</div>';
  return html;
}

function renderResult() {
  var clear = bossHp===0;
  return '<div class="result-big">'
    +'<div><span class="big-emoji">'+(clear?'🌋':'💀')+(clear?'<span class="clear-tag">CLEAR!</span>':'')+'</span></div>'
    +'<div class="result-h">'+(clear?'Mission Cleared!':'Battle Over...')+'</div>'
    +'<div class="score-box">'
      +'<div class="score-row">'
        +'<div><div class="score-n" style="color:#34d399">'+sesCorrect+'</div><div class="score-l">正解</div></div>'
        +'<div><div class="score-n" style="color:#f87171">'+(currentQs.length-sesCorrect)+'</div><div class="score-l">不正解</div></div>'
        +'<div><div class="score-n" style="color:#facc15">'+score+'</div><div class="score-l">ポイント</div></div>'
      +'</div>'
      +'<div class="score-div">累計習得: <strong>'+progress.masteredIds.length+'</strong> / '+TOTAL+' 問</div>'
    +'</div>'
    +'<button class="btn-again" id="btnAgain">⟳ 次の10問に挑戦</button>'
    +'<button class="btn-ghost" id="btnHome" style="margin-top:10px">ホームに戻る</button>'
    +'</div>';
}

// ==============================
// ACTIONS
// ==============================
function startBattle() {
  var pool = selectedRange==='ALL' ? QB : QB.filter(function(q){return q.week===selectedRange;});
  var targets = pool.filter(function(q){
    return progress.incorrectIds.indexOf(q.id)>=0 || progress.masteredIds.indexOf(q.id)<0;
  });
  var cands = shuffle(targets);
  if (cands.length < 10) {
    var rest = shuffle(pool.filter(function(q){return targets.indexOf(q)<0;}));
    cands = cands.concat(rest);
  }
  currentQs = cands.slice(0,10);
  curIdx = 0; score = 0; sesCorrect = 0;
  timerVal = 0; bossHp = 100; lastResult = null;
  gameState = 'QUIZ';
  stopTimer(); startTimer();
  render();
}

function handleAnswer(ans) {
  var q = currentQs[curIdx];
  var ok = ans === q.a;
  lastResult = {isCorrect:ok, correct:q.a, explain:q.explain};
  if (ok) {
    score += 10; sesCorrect++;
    bossHp = Math.max(0, bossHp-10);
    if (progress.masteredIds.indexOf(q.id)<0) progress.masteredIds.push(q.id);
    var idx = progress.incorrectIds.indexOf(q.id);
    if (idx>=0) progress.incorrectIds.splice(idx,1);
  } else {
    if (progress.incorrectIds.indexOf(q.id)<0) progress.incorrectIds.push(q.id);
  }
  saveProgress();
  updateHeader();
  render();
}

function goNext() {
  if (curIdx < currentQs.length - 1) {
    curIdx++; lastResult = null; render();
  } else {
    gameState = 'RESULT'; stopTimer(); render();
  }
}

function resetProg() {
  if (!confirm('進捗をすべてリセットしますか？')) return;
  progress = {masteredIds:[], incorrectIds:[]};
  saveProgress(); render();
}

// ==============================
// INIT
// ==============================
render();
</script>
</body>
</html>
