<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>国語バトル 6年1期</title>
<style>
:root{
  --bg:#12100e;--panel:#1e1a16;--panel2:#2a2318;--border:#3d3228;
  --gold:#d4a017;--gold2:#f0c040;--red:#e05050;--green:#4eb86a;
  --blue:#5588ee;--purple:#aa55ee;--text:#ede0cc;--text2:#8a7a60;
  --white:#fff8ee;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Mincho ProN','Yu Mincho','Georgia',serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:12px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 30% 10%,rgba(212,160,23,.06),transparent 50%),
             radial-gradient(ellipse at 70% 90%,rgba(170,85,238,.04),transparent 50%)}

.wrap{width:100%;max-width:680px;position:relative;z-index:1}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--panel);
  border:1px solid var(--border);border-radius:12px;margin-bottom:12px;
  position:relative;overflow:hidden}
.header::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--purple),var(--gold))}
.header h1{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.1em}
.header .sub{font-size:11px;color:var(--text2);margin-top:2px;font-family:sans-serif}
.home-btn{background:var(--panel2);border:1px solid var(--border);color:var(--text2);
  padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s;
  font-family:sans-serif}
.home-btn:hover{color:var(--text);border-color:var(--gold)}

/* START */
#start{padding:4px 0}
.stats-bar{display:flex;gap:8px;margin-bottom:12px}
.stat-pill{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:8px;text-align:center;font-size:11px;color:var(--text2);font-family:sans-serif}
.stat-pill strong{display:block;font-size:18px;font-weight:700;color:var(--gold);
  font-family:sans-serif}

.stage-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stage-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:16px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.stage-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stage-card.k1::before{background:linear-gradient(90deg,#4eb86a,#88ddaa)}
.stage-card.k2::before{background:linear-gradient(90deg,#5588ee,#88aaff)}
.stage-card.k3::before{background:linear-gradient(90deg,#d4a017,#f0c040)}
.stage-card.k4::before{background:linear-gradient(90deg,#aa55ee,#dd88ff)}
.stage-card.k5::before{background:linear-gradient(90deg,#e05050,#ff8844)}
.stage-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.stage-card .tag{font-size:10px;color:var(--text2);margin-bottom:4px;font-family:sans-serif}
.stage-card .title{font-size:14px;font-weight:700;color:var(--white);line-height:1.3}
.stage-card .sub2{font-size:11px;color:var(--text2);margin-top:4px;font-family:sans-serif}
.stage-card .prog{font-size:11px;margin-top:8px;display:flex;align-items:center;gap:6px;
  font-family:sans-serif}
.stage-card .prog-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.stage-card .prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.stage-card .stars{font-size:13px;margin-top:6px}

.weak-btn{width:100%;background:rgba(224,80,80,.12);border:1px solid rgba(224,80,80,.4);
  color:#ee8888;padding:12px;border-radius:12px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;margin-bottom:10px;display:flex;align-items:center;
  justify-content:center;gap:8px;font-family:sans-serif}
.weak-btn:hover{background:rgba(224,80,80,.2)}
.weak-btn.hidden{display:none}

/* BATTLE */
#battle{display:none}
.battle-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;
  background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.battle-title{font-size:13px;font-weight:700;color:var(--gold);flex:1;letter-spacing:.05em}
.q-counter{font-size:12px;color:var(--text2);white-space:nowrap;font-family:sans-serif}

.enemy-area{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:14px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden}
.enemy-name{font-size:14px;font-weight:700;color:var(--gold2);margin-bottom:8px;letter-spacing:.08em}
.enemy-face{font-size:52px;margin:8px 0;transition:transform .1s;line-height:1.2}
.enemy-face.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.hp-wrap{display:flex;align-items:center;gap:8px;margin-top:8px}
.hp-label{font-size:11px;color:var(--text2);white-space:nowrap;font-family:sans-serif}
.hp-bar{flex:1;height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden}
.hp-fill{height:100%;background:linear-gradient(90deg,#cc3333,#ff8844);border-radius:5px;transition:width .4s}
.hp-text{font-size:11px;color:var(--text2);white-space:nowrap;font-family:sans-serif}

.q-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-bottom:10px}
.q-meta{font-size:10px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;
  gap:6px;font-family:sans-serif}
.q-meta .badge{background:var(--panel2);border-radius:4px;padding:2px 6px}
.q-type-label{font-size:10px;padding:2px 8px;border-radius:10px;font-family:sans-serif}
.q-type-label.t1{background:rgba(78,184,106,.2);color:#4eb86a}
.q-type-label.t2{background:rgba(85,136,238,.2);color:#88aaff}
.q-type-label.t3{background:rgba(212,160,23,.2);color:#d4a017}
.q-type-label.t4{background:rgba(170,85,238,.2);color:#cc88ff}
.q-type-label.t5{background:rgba(224,80,80,.2);color:#ff8866}
.q-text{font-size:15px;line-height:1.7;color:var(--white);font-weight:600;
  white-space:pre-wrap}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.choices.single{grid-template-columns:1fr}
.choice{background:var(--panel);border:1.5px solid var(--border);border-radius:10px;
  padding:11px 12px;font-size:13px;cursor:pointer;transition:all .2s;line-height:1.5;
  text-align:left;color:var(--text);font-family:sans-serif}
.choice:hover:not(.disabled){border-color:var(--gold);background:var(--panel2);color:var(--white)}
.choice.correct{border-color:var(--green)!important;background:rgba(78,184,106,.15)!important;color:var(--green)!important}
.choice.wrong{border-color:var(--red)!important;background:rgba(224,80,80,.15)!important;color:var(--red)!important}
.choice.disabled{cursor:default;opacity:.7}

.result-msg{text-align:center;font-size:15px;font-weight:700;padding:10px;
  border-radius:10px;margin-bottom:10px;opacity:0;transition:opacity .3s;
  font-family:sans-serif}
.result-msg.show{opacity:1}
.result-msg.ok{background:rgba(78,184,106,.15);color:var(--green)}
.result-msg.ng{background:rgba(224,80,80,.15);color:var(--red)}

.explain-box{background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;font-size:12px;line-height:1.8;color:var(--text);margin-bottom:10px;
  display:none;font-family:sans-serif}
.explain-box.show{display:block}
.explain-box strong{color:var(--gold2)}

.next-btn{width:100%;background:#7a5c1a;color:var(--gold2);border:1px solid var(--gold);
  border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;
  transition:all .2s;display:none;font-family:sans-serif;letter-spacing:.05em}
.next-btn:hover{background:var(--gold);color:var(--bg)}
.next-btn.show{display:block}

/* CLEAR */
#clear{display:none;padding:20px 0;text-align:center}
.clear-emoji{font-size:64px;margin-bottom:12px}
.clear-title{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:6px;letter-spacing:.1em}
.clear-sub{font-size:13px;color:var(--text2);margin-bottom:20px;font-family:sans-serif}
.score-big{font-size:48px;font-weight:700;color:var(--gold2);margin:8px 0;font-family:sans-serif}
.score-label{font-size:12px;color:var(--text2);font-family:sans-serif}
.clear-btns{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.clear-btn{padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;
  border:none;transition:all .2s;font-family:sans-serif}
.clear-btn.primary{background:#7a5c1a;color:var(--gold2);border:1px solid var(--gold)}
.clear-btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.clear-btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="h1" style="font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.1em">📖 国語バトル</div>
      <div class="sub">6年1期 言語・語彙・熟語</div>
    </div>
    <button class="home-btn" id="homeBtn" onclick="goHome()" style="display:none">🏠 ホーム</button>
  </div>

  <div id="start">
    <div class="stats-bar">
      <div class="stat-pill"><strong id="totalMastered">0</strong>習得</div>
      <div class="stat-pill"><strong id="totalQ">0</strong>全問題</div>
      <div class="stat-pill"><strong id="totalWeak">0</strong>弱点</div>
    </div>
    <button class="weak-btn hidden" id="weakBtn" onclick="startWeak()">⚔️ 弱点集中モード（<span id="weakCount">0</span>問）</button>
    <div class="stage-grid" id="stageGrid"></div>
  </div>

  <div id="battle">
    <div class="battle-header">
      <div class="battle-title" id="battleTitle"></div>
      <div class="q-counter" id="qCounter"></div>
    </div>
    <div class="enemy-area">
      <div class="enemy-name" id="enemyName"></div>
      <div class="enemy-face" id="enemyFace"></div>
      <div class="hp-wrap">
        <div class="hp-label">HP</div>
        <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
        <div class="hp-text" id="hpText"></div>
      </div>
    </div>
    <div class="q-box">
      <div class="q-meta">
        <span class="badge" id="qWeek"></span>
        <span class="q-type-label" id="qTypeLabel"></span>
      </div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="explain-box" id="explainBox"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">つぎへ →</button>
  </div>

  <div id="clear">
    <div class="clear-emoji" id="clearEmoji"></div>
    <div class="clear-title" id="clearTitle"></div>
    <div class="clear-sub" id="clearSub"></div>
    <div class="score-label">正解数</div>
    <div class="score-big" id="scoreBig"></div>
    <div class="score-label" id="scoreLabel2"></div>
    <div class="clear-btns">
      <button class="clear-btn primary" onclick="goHome()">🏠 ホームへ</button>
      <button class="clear-btn secondary" id="retryBtn" onclick="retryStage()">🔄 もう一度</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// 問題データベース
// ================================================================
const QDB = [

// ════════════════════════════════════════
// 2月1週：かなと漢字
// ════════════════════════════════════════
{id:'k1_01',stage:'k1',week:'2月1週',topic:'かなづかい',tclass:'t1',
 q:'かなづかいが正しいものはどれですか？',
 a:'おおきい',
 opts:['おうきい','おおきい','おうおかみ','とうい'],
 ex:'「オー」の長音はふつう「う」を使うが、<strong>おおきい・おおかみ・こおり</strong>などは「お」を重ねて書く例外。'},

{id:'k1_02',stage:'k1',week:'2月1週',topic:'かなづかい',tclass:'t1',
 q:'かなづかいのまちがっているものはどれですか？',
 a:'ちかずく',
 opts:['ちかずく','はなぢ','みかづき','こづかい'],
 ex:'「ちかづく（近づく）」は「つ」が濁って「づ」になる複合語ルールで<strong>ちかづく</strong>が正しい。「ちかずく」は誤り。'},

{id:'k1_03',stage:'k1',week:'2月1週',topic:'かなづかい',tclass:'t1',
 q:'次のうち、「ぢ・づ」を使うのが正しいものはどれですか？',
 a:'みかづき',
 opts:['じめん','いなずま','みかづき','すず'],
 ex:'「みかづき（三日月）」は「みっか」の「か」が濁ったもの。同じ音が続く場合や複合語の場合は<strong>ぢ・づ</strong>を使う。'},

{id:'k1_04',stage:'k1',week:'2月1週',topic:'送りがな',tclass:'t1',
 q:'正しい送りがなはどれですか？\n「かなし（  ）できごと」',
 a:'悲しい',
 opts:['悲い','悲しい','悲しきい','悲かない'],
 ex:'形容詞の送りがな：「〜しい」で終わるものは<strong>「し」から送る</strong>。「悲しい」の「しい」がすべて送りがな。'},

{id:'k1_05',stage:'k1',week:'2月1週',topic:'送りがな',tclass:'t1',
 q:'正しい送りがなはどれですか？\n「うけつけに申し（  ）む」',
 a:'申し込む',
 opts:['申し込む','申込む','申しこむ','申しこ（む）'],
 ex:'複合動詞の送りがな：活用のある言葉は言い切りの形が<strong>ウ段音</strong>で終わるように送る。「込む」で完結。'},

{id:'k1_06',stage:'k1',week:'2月1週',topic:'送りがな',tclass:'t1',
 q:'「さいわいにも助かる」の正しい漢字＋送りがなは？',
 a:'幸いにも',
 opts:['幸いにも','幸にも','幸きにも','幸わいにも'],
 ex:'「幸い」は名詞でもあるが形容動詞語幹。<strong>「い」まで送りがな</strong>をつけて「幸い」と書く。'},

{id:'k1_07',stage:'k1',week:'2月1週',topic:'漢字の成り立ち',tclass:'t1',
 q:'「象形文字」の説明として正しいのはどれですか？',
 a:'目に見えるものの形をかたどってできた漢字（例：日・月・山）',
 opts:['意味を表す部分と音を表す部分を組み合わせた漢字','形のない事柄を点や線で示した漢字','目に見えるものの形をかたどってできた漢字（例：日・月・山）','複数の漢字を組み合わせて新たな意味をもたせた漢字'],
 ex:'<strong>象形</strong>は形をかたどる→日・月・山・川など。<strong>指事</strong>は点線で示す→一・上・中。<strong>会意</strong>は組み合わせ→男（田＋力）。<strong>形声</strong>は意味＋音→晴・花など（最多の約80%）。'},

{id:'k1_08',stage:'k1',week:'2月1週',topic:'漢字の成り立ち',tclass:'t1',
 q:'「男」「林」「休」はどの種類の漢字ですか？',
 a:'会意文字',
 opts:['象形文字','指事文字','会意文字','形声文字'],
 ex:'<strong>会意文字</strong>：複数の漢字を音に関係なく組み合わせる。男＝田＋力、林＝木＋木、休＝人＋木。'},

{id:'k1_09',stage:'k1',week:'2月1週',topic:'漢字の成り立ち',tclass:'t1',
 q:'「晴・飯・花・想」はどの種類の漢字ですか？',
 a:'形声文字',
 opts:['象形文字','会意文字','指事文字','形声文字'],
 ex:'<strong>形声文字</strong>は意味を表す部首＋音を表す部分の組み合わせ。漢字の約<strong>80%</strong>を占める最多の種類。'},

{id:'k1_10',stage:'k1',week:'2月1週',topic:'漢字の成り立ち',tclass:'t1',
 q:'「一・上・中」はどの種類の漢字ですか？',
 a:'指事文字',
 opts:['象形文字','指事文字','会意文字','形声文字'],
 ex:'<strong>指事文字</strong>は形のない数・位置などを点や線で示した漢字。一・上・下・中・本・末などが代表例。'},

{id:'k1_11',stage:'k1',week:'2月1週',topic:'部首名',tclass:'t1',
 q:'「安」の部首名はどれですか？',
 a:'うかんむり',
 opts:['うかんむり','おんなへん','のぎへん','きへん'],
 ex:'「安」は「宀（うかんむり）」＋「女」の会意文字。<strong>うかんむり（宀）</strong>が部首。'},

{id:'k1_12',stage:'k1',week:'2月1週',topic:'部首名',tclass:'t1',
 q:'「時」の部首名はどれですか？',
 a:'ひへん',
 opts:['にちへん','ひへん','てへん','ごんべん'],
 ex:'「時」の部首は<strong>ひへん（日偏）</strong>。日・時・明・晴・暑など時間・光に関する漢字に多い。'},

{id:'k1_13',stage:'k1',week:'2月1週',topic:'部首名',tclass:'t1',
 q:'「国」の部首名はどれですか？',
 a:'くにがまえ',
 opts:['くにがまえ','もんがまえ','かくしがまえ','けいがまえ'],
 ex:'「国」の部首は<strong>くにがまえ（囗）</strong>。囲・因・図・回・園なども同じ部首。'},

{id:'k1_14',stage:'k1',week:'2月1週',topic:'部首名',tclass:'t1',
 q:'「集」の部首名はどれですか？',
 a:'ふるとり',
 opts:['ふるとり','とりへん','たけかんむり','あめかんむり'],
 ex:'「集」の部首は<strong>ふるとり（隹）</strong>。雀・雄・雌・難・雑なども同じ部首（鳥に関わる字が多い）。'},

{id:'k1_15',stage:'k1',week:'2月1週',topic:'部首名',tclass:'t1',
 q:'「海」の部首名はどれですか？',
 a:'さんずい',
 opts:['さんずい','にすい','みず','ゆうべ'],
 ex:'「海」の部首は<strong>さんずい（氵）</strong>。水に関係する漢字（河・湖・波・泳・深など）はほぼさんずい。'},

// ════════════════════════════════════════
// 2月2週：同訓異字
// ════════════════════════════════════════
{id:'k2_01',stage:'k2',week:'2月2週',topic:'同訓異字',tclass:'t2',
 q:'「室内が（あたたか）い」に使う漢字はどれですか？',
 a:'暖かい',
 opts:['暖かい','温かい','温まる','暖まる'],
 ex:'<strong>暖かい</strong>＝気温・気候が心地よい（室内・気候）。<strong>温かい</strong>＝ものの温度が心地よい（料理・飲み物）。'},

{id:'k2_02',stage:'k2',week:'2月2週',topic:'同訓異字',tclass:'t2',
 q:'「努力が実を（うむ）」に使う漢字はどれですか？',
 a:'生む',
 opts:['産む','生む','膿む','成む'],
 ex:'<strong>産む</strong>＝子を産む（動物・人間の出産）。<strong>生む</strong>＝新しく作り出す（成果を生む・利益を生む）。'},

{id:'k2_03',stage:'k2',week:'2月2週',topic:'同訓異字',tclass:'t2',
 q:'「先頭の走者を（おう）」に使う漢字はどれですか？',
 a:'追う',
 opts:['負う','追う','敗う','御う'],
 ex:'<strong>負う</strong>＝背負う・責任を自分の身に受ける。<strong>追う</strong>＝後から進む・追いかける。'},

{id:'k2_04',stage:'k2',week:'2月2週',topic:'同訓異字',tclass:'t2',
 q:'「花束を（おくる）」に使う漢字はどれですか？',
 a:'贈る',
 opts:['送る','贈る','遅れる','後れる'],
 ex:'<strong>送る</strong>＝物を届ける（小包を送る）。<strong>贈る</strong>＝人にプレゼントする（花束・贈り物）。'},

{id:'k2_05',stage:'k2',week:'2月2週',topic:'同訓異字',tclass:'t2',
 q:'「学級委員に（おす）」に使う漢字はどれですか？',
 a:'推す',
 opts:['押す','推す','抑す','欧す'],
 ex:'<strong>押す</strong>＝力を加える（ボタンを押す）。<strong>推す</strong>＝ふさわしいとして他人にすすめる（委員に推す）。'},

{id:'k2_06',stage:'k2',week:'2月2週',topic:'同訓異字',tclass:'t2',

// ================================================================
// ステージ定義
// ================================================================
const STAGES=[
  {id:'k1',cls:'k1',name:'2月1週',sub:'かなと漢字',topic:'かなづかい・送りがな・漢字の成り立ち・部首',
   boss:'📜 文字の守護者',bossName:'カルタ・マスター'},
  {id:'k2',cls:'k2',name:'2月2週',sub:'同訓異字',topic:'同じ訓読み・意味で使い分ける漢字',
   boss:'⚔️ 同訓の刺客',bossName:'ドウクン'},
  {id:'k3',cls:'k3',name:'2月3週',sub:'同音異義語',topic:'同じ音・異なる意味の漢字語',
   boss:'🔤 音の魔術師',bossName:'ドウオン卿'},
  {id:'k4',cls:'k4',name:'3月1週',sub:'類義語・対義語',topic:'意味が似た語・反対の語',
   boss:'⚖️ 言葉の天秤',bossName:'タイギ・マスター'},
  {id:'k5',cls:'k5',name:'3月2週',sub:'熟語総合',topic:'熟語の組み立て・四字熟語・接頭語',
   boss:'🏯 熟語の大魔王',bossName:'ジュクゴ大帝'},
];

// ================================================================
// LocalStorage
// ================================================================
const LS_M='kokugo1ki_mastered', LS_I='kokugo1ki_incorrect';
function loadLS(){
  try{return{mastered:JSON.parse(localStorage.getItem(LS_M)||'[]'),incorrect:JSON.parse(localStorage.getItem(LS_I)||'[]')};}
  catch(e){return{mastered:[],incorrect:[]};}
}
function saveLS(m,i){localStorage.setItem(LS_M,JSON.stringify(m));localStorage.setItem(LS_I,JSON.stringify(i));}

// ================================================================
// 状態
// ================================================================
let state={mode:'home',stageId:null,questions:[],qIndex:0,score:0,answered:false,mastered:[],incorrect:[]};

function shuffleArr(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ================================================================
// ホーム
// ================================================================
function init(){const ls=loadLS();state.mastered=ls.mastered;state.incorrect=ls.incorrect;renderHome();}

function renderHome(){
  document.getElementById('start').style.display='block';
  document.getElementById('battle').style.display='none';
  document.getElementById('clear').style.display='none';
  document.getElementById('homeBtn').style.display='none';
  const ls=loadLS();state.mastered=ls.mastered;state.incorrect=ls.incorrect;

  document.getElementById('totalQ').textContent=QDB.length;
  document.getElementById('totalMastered').textContent=state.mastered.length;
  document.getElementById('totalWeak').textContent=state.incorrect.length;

  const wb=document.getElementById('weakBtn');
  if(state.incorrect.length>0){wb.classList.remove('hidden');document.getElementById('weakCount').textContent=state.incorrect.length;}
  else{wb.classList.add('hidden');}

  const grid=document.getElementById('stageGrid');
  grid.innerHTML='';
  STAGES.forEach(st=>{
    const qs=QDB.filter(q=>q.stage===st.id);
    const mc=qs.filter(q=>state.mastered.includes(q.id)).length;
    const pct=qs.length>0?Math.round(mc/qs.length*100):0;
    const stars=pct===100?'⭐⭐⭐':pct>=60?'⭐⭐':pct>=30?'⭐':'';
    const card=document.createElement('div');
    card.className=`stage-card ${st.cls}`;
    card.innerHTML=`
      <div class="tag">${st.name}</div>
      <div class="title">${st.sub}</div>
      <div class="sub2">${st.topic}</div>
      <div class="prog">
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        <span style="font-size:11px;color:var(--text2)">${mc}/${qs.length}</span>
      </div>
      ${stars?`<div class="stars">${stars}</div>`:''}
    `;
    card.onclick=()=>startStage(st.id);
    grid.appendChild(card);
  });
}

// ================================================================
// バトル開始
// ================================================================
function startStage(stageId){
  const qs=QDB.filter(q=>q.stage===stageId);
  const weak=qs.filter(q=>state.incorrect.includes(q.id));
  const unlearned=qs.filter(q=>!state.mastered.includes(q.id)&&!state.incorrect.includes(q.id));
  const mastered=qs.filter(q=>state.mastered.includes(q.id)&&!state.incorrect.includes(q.id));
  const pool=[...shuffleArr(weak),...shuffleArr(unlearned),...shuffleArr(mastered)];
  const st=STAGES.find(s=>s.id===stageId);
  launchBattle(pool,st.name+' '+st.sub,st.bossName,st.boss,stageId);
}

function startWeak(){
  const weak=QDB.filter(q=>state.incorrect.includes(q.id));
  launchBattle(shuffleArr(weak),'弱点集中モード','👹 ラスボス','⚔️ 全弱点','weak');
}

function launchBattle(pool,title,bossName,bossFace,stageId){
  state={...state,mode:'battle',stageId,questions:pool,qIndex:0,score:0};
  document.getElementById('start').style.display='none';
  document.getElementById('battle').style.display='block';
  document.getElementById('clear').style.display='none';
  document.getElementById('homeBtn').style.display='block';
  document.getElementById('battleTitle').textContent=title;
  document.getElementById('enemyName').textContent=bossName;
  document.getElementById('enemyFace').textContent=bossFace;
  updateHP();showQ();
}

function updateHP(){
  const total=state.questions.length, rem=total-state.qIndex;
  const pct=Math.round(rem/total*100);
  document.getElementById('hpFill').style.width=pct+'%';
  document.getElementById('hpText').textContent=rem+'/'+total;
  document.getElementById('qCounter').textContent=(state.qIndex+1)+'/'+total;
}

// ================================================================
// 問題表示
// ================================================================
function showQ(){
  if(state.qIndex>=state.questions.length){showClear();return;}
  const q=state.questions[state.qIndex];
  state.answered=false;

  document.getElementById('qWeek').textContent=q.week;
  // type label
  const tl=document.getElementById('qTypeLabel');
  tl.textContent=q.topic;
  tl.className='q-type-label '+(q.tclass||'t1');

  document.getElementById('qText').textContent=q.q;
  document.getElementById('resultMsg').className='result-msg';
  document.getElementById('resultMsg').textContent='';
  document.getElementById('explainBox').className='explain-box';
  document.getElementById('nextBtn').className='next-btn';

  const opts=shuffleArr(q.opts);
  // 選択肢が3文字以上長いなら1列
  const isLong=opts.some(o=>o.length>14);
  const choicesEl=document.getElementById('choices');
  choicesEl.className='choices'+(isLong?' single':'');
  choicesEl.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.textContent=opt;
    btn.onclick=()=>answerQ(btn,opt,q);
    choicesEl.appendChild(btn);
  });
  updateHP();
}

// ================================================================
// 解答
// ================================================================
function answerQ(btn,chosen,q){
  if(state.answered)return;
  state.answered=true;
  document.querySelectorAll('.choice').forEach(b=>b.classList.add('disabled'));

  const correct=chosen===q.a;
  if(correct){
    btn.classList.add('correct');
    state.score++;
    if(!state.mastered.includes(q.id))state.mastered.push(q.id);
    state.incorrect=state.incorrect.filter(id=>id!==q.id);
    const rm=document.getElementById('resultMsg');
    rm.className='result-msg show ok';
    rm.textContent='⭐ 正解！';
    const face=document.getElementById('enemyFace');
    face.classList.add('shake');setTimeout(()=>face.classList.remove('shake'),300);
  }else{
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b=>{if(b.textContent===q.a)b.classList.add('correct');});
    if(!state.incorrect.includes(q.id))state.incorrect.push(q.id);
    state.mastered=state.mastered.filter(id=>id!==q.id);
    const rm=document.getElementById('resultMsg');
    rm.className='result-msg show ng';
    rm.textContent='✗ 不正解…';
  }
  saveLS(state.mastered,state.incorrect);
  if(q.ex){
    const eb=document.getElementById('explainBox');
    eb.innerHTML='<strong>解説</strong>：'+q.ex;
    eb.className='explain-box show';
  }
  document.getElementById('nextBtn').className='next-btn show';
}

function nextQ(){state.qIndex++;showQ();}

// ================================================================
// クリア
// ================================================================
function showClear(){
  const total=state.questions.length, pct=Math.round(state.score/total*100);
  document.getElementById('battle').style.display='none';
  document.getElementById('clear').style.display='block';
  let emoji='😤',title='もう少し！',sub='弱点をもう一度やろう！';
  if(pct>=90){emoji='🏆';title='完璧！';sub='ほぼ全問正解！次のステージへ！';}
  else if(pct>=70){emoji='⭐';title='合格！';sub='もう一息で完璧だ！';}
  else if(pct>=50){emoji='💪';title='まあまあ！';sub='弱点集中モードで補強しよう。';}
  document.getElementById('clearEmoji').textContent=emoji;
  document.getElementById('clearTitle').textContent=title;
  document.getElementById('clearSub').textContent=sub;
  document.getElementById('scoreBig').textContent=state.score;
  document.getElementById('scoreLabel2').textContent='/ '+total+' 問（'+pct+'%）';
}

function retryStage(){if(state.stageId==='weak')startWeak();else if(state.stageId)startStage(state.stageId);}

function goHome(){
  if(state.mode==='battle'){if(!confirm('ホームへ戻りますか？'))return;}
  state.mode='home';renderHome();
}

init();
</script>
