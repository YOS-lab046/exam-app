<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>理科バトル 6年1期</title>
<style>
:root{
  --bg:#0a1628;--panel:#0f2040;--panel2:#162d55;--border:#1e3d6b;
  --teal:#00c8c8;--teal2:#009898;--amber:#ffb600;--red:#ff4444;
  --green:#22dd88;--blue:#4488ff;--text:#d8eaf8;--text2:#6a8aaa;
  --white:#f0f8ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;padding:12px;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 15%,rgba(0,200,200,.07),transparent 50%),
             radial-gradient(ellipse at 80% 85%,rgba(68,136,255,.06),transparent 50%)}

.wrap{width:100%;max-width:680px;position:relative;z-index:1}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--panel);border:1px solid var(--border);
  border-radius:12px;margin-bottom:12px}
.header h1{font-size:18px;font-weight:700;color:var(--teal);letter-spacing:.05em}
.header .sub{font-size:11px;color:var(--text2);margin-top:2px}
.home-btn{background:var(--panel2);border:1px solid var(--border);color:var(--text2);
  padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s}
.home-btn:hover{color:var(--text);border-color:var(--teal)}

/* ── START SCREEN ── */
#start{padding:4px 0}
.stage-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stage-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:16px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.stage-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stage-card.s1::before{background:linear-gradient(90deg,#22dd88,#00c8c8)}
.stage-card.s2::before{background:linear-gradient(90deg,#4488ff,#22dd88)}
.stage-card.s3::before{background:linear-gradient(90deg,#ffb600,#ff6644)}
.stage-card.s4::before{background:linear-gradient(90deg,#cc44ff,#4488ff)}
.stage-card.s5::before{background:linear-gradient(90deg,#ff4444,#cc44ff)}
.stage-card.sw::before{background:linear-gradient(90deg,#ffb600,#ff4444)}
.stage-card:hover{border-color:var(--teal);transform:translateY(-2px)}
.stage-card .tag{font-size:10px;color:var(--text2);margin-bottom:4px}
.stage-card .title{font-size:14px;font-weight:700;color:var(--white);line-height:1.3}
.stage-card .sub2{font-size:11px;color:var(--text2);margin-top:4px}
.stage-card .prog{font-size:11px;margin-top:8px;display:flex;align-items:center;gap:6px}
.stage-card .prog-bar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.stage-card .prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .5s}
.stage-card .stars{font-size:13px;margin-top:6px}

.weak-btn{width:100%;background:rgba(255,68,68,.12);border:1px solid rgba(255,68,68,.4);
  color:#ff8888;padding:12px;border-radius:12px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;margin-bottom:10px;display:flex;align-items:center;
  justify-content:center;gap:8px}
.weak-btn:hover{background:rgba(255,68,68,.2)}
.weak-btn.hidden{display:none}

.stats-bar{display:flex;gap:8px;margin-bottom:12px}
.stat-pill{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:8px;text-align:center;font-size:11px;color:var(--text2)}
.stat-pill strong{display:block;font-size:18px;font-weight:700;color:var(--teal)}

/* ── BATTLE SCREEN ── */
#battle{display:none}
.battle-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;
  background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.battle-title{font-size:13px;font-weight:600;color:var(--teal);flex:1}
.q-counter{font-size:12px;color:var(--text2);white-space:nowrap}

.enemy-area{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:14px;margin-bottom:12px;text-align:center;position:relative;overflow:hidden}
.enemy-name{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:8px}
.enemy-face{font-size:52px;margin:8px 0;transition:transform .1s}
.enemy-face.shake{animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.hp-wrap{display:flex;align-items:center;gap:8px;margin-top:8px}
.hp-label{font-size:11px;color:var(--text2);white-space:nowrap}
.hp-bar{flex:1;height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden}
.hp-fill{height:100%;background:linear-gradient(90deg,#ff4444,#ff8844);border-radius:5px;transition:width .4s}
.hp-text{font-size:11px;color:var(--text2);white-space:nowrap}

.q-box{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-bottom:10px}
.q-meta{font-size:10px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.q-meta .badge{background:var(--panel2);border-radius:4px;padding:2px 6px}
.q-text{font-size:15px;line-height:1.6;color:var(--white);font-weight:600}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.choice{background:var(--panel);border:1.5px solid var(--border);border-radius:10px;
  padding:11px 12px;font-size:13px;cursor:pointer;transition:all .2s;line-height:1.4;
  text-align:left;color:var(--text)}
.choice:hover:not(.disabled){border-color:var(--teal);background:var(--panel2);color:var(--white)}
.choice.correct{border-color:var(--green)!important;background:rgba(34,221,136,.15)!important;color:var(--green)!important}
.choice.wrong{border-color:var(--red)!important;background:rgba(255,68,68,.15)!important;color:var(--red)!important}
.choice.disabled{cursor:default;opacity:.7}

.result-msg{text-align:center;font-size:15px;font-weight:700;padding:10px;
  border-radius:10px;margin-bottom:10px;opacity:0;transition:opacity .3s}
.result-msg.show{opacity:1}
.result-msg.ok{background:rgba(34,221,136,.15);color:var(--green)}
.result-msg.ng{background:rgba(255,68,68,.15);color:var(--red)}

.explain-box{background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;font-size:12px;line-height:1.7;color:var(--text);margin-bottom:10px;
  display:none}
.explain-box.show{display:block}
.explain-box strong{color:var(--amber)}

.next-btn{width:100%;background:var(--teal2);color:var(--bg);border:none;border-radius:10px;
  padding:13px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:none}
.next-btn:hover{background:var(--teal)}
.next-btn.show{display:block}

/* ── CLEAR SCREEN ── */
#clear{display:none;padding:20px 0;text-align:center}
.clear-emoji{font-size:64px;margin-bottom:12px}
.clear-title{font-size:22px;font-weight:700;color:var(--teal);margin-bottom:6px}
.clear-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.score-big{font-size:48px;font-weight:700;color:var(--amber);margin:8px 0}
.score-label{font-size:12px;color:var(--text2)}
.clear-btns{display:flex;flex-direction:column;gap:8px;margin-top:20px}
.clear-btn{padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.clear-btn.primary{background:var(--teal2);color:var(--bg)}
.clear-btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.clear-btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="h1">🔬 理科バトル</div>
      <div class="sub">6年1期 生物と環境・水溶液</div>
    </div>
    <button class="home-btn" id="homeBtn" onclick="goHome()" style="display:none">🏠 ホーム</button>
  </div>

  <!-- START -->
  <div id="start">
    <div class="stats-bar">
      <div class="stat-pill"><strong id="totalMastered">0</strong>習得</div>
      <div class="stat-pill"><strong id="totalQ">0</strong>全問題</div>
      <div class="stat-pill"><strong id="totalWeak">0</strong>弱点</div>
    </div>
    <button class="weak-btn hidden" id="weakBtn" onclick="startWeak()">⚔️ 弱点集中モード（<span id="weakCount">0</span>問）</button>
    <div class="stage-grid" id="stageGrid"></div>
  </div>

  <!-- BATTLE -->
  <div id="battle">
    <div class="battle-header">
      <div class="battle-title" id="battleTitle"></div>
      <div class="q-counter" id="qCounter"></div>
    </div>
    <div class="enemy-area">
      <div class="enemy-name" id="enemyName"></div>
      <div class="enemy-face" id="enemyFace"></div>
      <div class="hp-wrap">
        <div class="hp-label">HP</div>
        <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
        <div class="hp-text" id="hpText"></div>
      </div>
    </div>
    <div class="q-box">
      <div class="q-meta"><span class="badge" id="qWeek"></span><span id="qType"></span></div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="explain-box" id="explainBox"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQ()">つぎへ →</button>
  </div>

  <!-- CLEAR -->
  <div id="clear">
    <div class="clear-emoji" id="clearEmoji"></div>
    <div class="clear-title" id="clearTitle"></div>
    <div class="clear-sub" id="clearSub"></div>
    <div class="score-label">正解数</div>
    <div class="score-big" id="scoreBig"></div>
    <div class="score-label" id="scoreLabel2"></div>
    <div class="clear-btns">
      <button class="clear-btn primary" onclick="goHome()">🏠 ホームへ</button>
      <button class="clear-btn secondary" id="retryBtn" onclick="retryStage()">🔄 もう一度</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// 問題バンク
// ================================================================
const QDB = [
  // ════ 2月1週：生物と環境① ════
  {id:'s1_01',stage:'s1',week:'2月1週',topic:'植物・光',
   q:'陽生植物（陽樹）はどれですか？',
   a:'マツ・クリ・クヌギ・ナラ',
   opts:['シイ・カシ・ブナ','マツ・クリ・クヌギ・ナラ','ヤツデ・アオキ・アジサイ','シダ・コケ・ヤブラン'],
   ex:'陽樹は成長するのに<strong>強い光</strong>を必要とする樹木。マツ・クリ・クヌギ・ナラなどが代表。陰樹はシイ・カシ・ブナ・スギ・ヒノキ。'},
  {id:'s1_02',stage:'s1',week:'2月1週',topic:'植物・光',
   q:'次のうち「陰生植物（陰樹）」はどれですか？',
   a:'シイ・カシ・スギ',
   opts:['マツ・クヌギ・ナラ','アサガオ・ヒマワリ','シイ・カシ・スギ','ナズナ・エンドウ'],
   ex:'<strong>陰樹</strong>は比かく的弱い光でも成長できる植物。シイ・カシ・ブナ・スギ・ヒノキが代表。'},
  {id:'s1_03',stage:'s1',week:'2月1週',topic:'植物・草',
   q:'「一年草」の特徴はどれですか？',
   a:'春に芽生え、夏から秋に開花し、冬は種子でこす',
   opts:['秋に芽生え、翌年の春〜夏に開花する','春に芽生え、夏から秋に開花し、冬は種子でこす','秋から冬に地上部が枯れ、春にまた生える','何年も開花をくり返す'],
   ex:'<strong>一年草</strong>：春に芽生え→夏〜秋に開花→種子を残す→冬は種子で越す。アサガオ・ヒマワリ・エノコログサなど。'},
  {id:'s1_04',stage:'s1',week:'2月1週',topic:'植物・草',
   q:'「越年草」の例として正しいものはどれですか？',
   a:'ナズナ・エンドウ・アブラナ',
   opts:['アサガオ・ヒマワリ','スズキ・ヨモギ・ユリ','ナズナ・エンドウ・アブラナ','ヤブラン・シュンラン'],
   ex:'<strong>越年草</strong>は秋に芽生え、翌年の春〜夏に開花して種子を残し、冬までに枯れる。ナズナ・エンドウ・アブラナ・ヒメジョオンなど。'},
  {id:'s1_05',stage:'s1',week:'2月1週',topic:'森林',
   q:'「高木」の特徴はどれですか？',
   a:'まっすぐな太い幹をもち、8m以上に成長する',
   opts:['幹がなく枝分かれし、3mくらいにしかならない','陰生植物で森林内の水分を保つ','まっすぐな太い幹をもち、8m以上に成長する','森林のまわりを囲むように生える陽生植物'],
   ex:'<strong>高木</strong>はまっすぐで太い幹をもち、8m以上になる。低木は幹がなく枝分かれして3mくらい。'},
  {id:'s1_06',stage:'s1',week:'2月1週',topic:'森林',
   q:'森林のつくりで「下草」はどのような役割をしていますか？',
   a:'陰生植物で、森林内の水分を保つ',
   opts:['強い光で光合成をおこなう陽生植物','8m以上に成長して森の上層を形成','陰生植物で、森林内の水分を保つ','森林のまわりを乾燥から守る'],
   ex:'<strong>下草</strong>は陰生植物で、森林内の水分を保つはたらきをしている。'},
  {id:'s1_07',stage:'s1',week:'2月1週',topic:'森林',
   q:'「落葉樹」の森林が秋から春にかけて明るくなる理由はどれですか？',
   a:'葉が落葉するため、光が届きやすくなるから',
   opts:['葉が落葉するため、光が届きやすくなるから','光合成の量が増えるから','常緑樹が減るから','木の高さが低くなるから'],
   ex:'ミズナラなどの<strong>落葉樹</strong>の森林は秋〜春先に葉が落ちるので、光が差し込んで明るくなる。常緑樹の森林は明るさの変化が小さい。'},
  {id:'s1_08',stage:'s1',week:'2月1週',topic:'食物連鎖',
   q:'「食物連鎖」とはどのようなつながりですか？',
   a:'生物が食べる・食べられるという関係のつながり',
   opts:['生物が共同して生活するつながり','生物が食べる・食べられるという関係のつながり','生物の炭素をとりこむつながり','生物が養分をつくるつながり'],
   ex:'<strong>食物連鎖</strong>は生物が食べる・食べられるという関係のつながり。食物連鎖によって複雑な網の目のようにつながっている。'},
  {id:'s1_09',stage:'s1',week:'2月1週',topic:'食物連鎖',
   q:'「生産者」とはどのような生物ですか？',
   a:'光合成によって養分をつくりだす植物',
   opts:['ほかの生物を食べる動物','死がいやふんを分解する細菌類','光合成によって養分をつくりだす植物','寄生して生活する生物'],
   ex:'<strong>生産者</strong>は光合成によって自ら養分をつくりだす植物のこと。動物は生産者にはなれない。'},
  {id:'s1_10',stage:'s1',week:'2月1週',topic:'食物連鎖',
   q:'「分解者」に当てはまるものはどれですか？',
   a:'細菌類やカビ・キノコなどの菌類',
   opts:['イネ・クサ・ヤブラン','ミジンコ・ゾウリムシ','細菌類やカビ・キノコなどの菌類','サギ・タカなどの肉食動物'],
   ex:'<strong>分解者</strong>は落ち葉・死がい・動物のふんなどを分解して肥料に変える。細菌類やカビ・キノコなどの菌類がこれにあたる。'},
  {id:'s1_11',stage:'s1',week:'2月1週',topic:'物質の循環',
   q:'炭素の循環について、植物が空気中からとりこむものはどれですか？',
   a:'二酸化炭素',
   opts:['酸素','水素','二酸化炭素','ちっ素'],
   ex:'植物は<strong>光合成</strong>で空気中の<strong>二酸化炭素</strong>から炭素をとりこんで養分をつくる。これが炭素の循環のスタート。'},
  {id:'s1_12',stage:'s1',week:'2月1週',topic:'物質の循環',
   q:'ちっ素の循環で、植物が根からとりこむものはどれですか？',
   a:'ちっ素（窒素）をふくんだ肥料',
   opts:['二酸化炭素','酸素','炭素をふくんだ養分','ちっ素（窒素）をふくんだ肥料'],
   ex:'分解者が落ち葉やふんを分解して<strong>ちっ素（肥料）</strong>を放出→植物が根からとりこむ、という循環が成り立っている。'},
  {id:'s1_13',stage:'s1',week:'2月1週',topic:'共生・寄生',
   q:'「寄生」の説明として正しいのはどれですか？',
   a:'生物が他の生きている生物を栄養分として生活すること',
   opts:['異なる生物が共同して生活し、たがいに利益を得ること','生物が他の生きている生物を栄養分として生活すること','食物連鎖によって生物がつながること','分解者が養分を分解すること'],
   ex:'<strong>寄生</strong>は、ある生物が他の生きている生物（宿主）を栄養分として生活すること。アオムシコマユバチの幼虫がアオムシに寄生するのが例。'},
  {id:'s1_14',stage:'s1',week:'2月1週',topic:'森林',
   q:'「極相（極相林）」とはどのような状態ですか？',
   a:'森林が最終的に安定した状態（陰樹の森林）',
   opts:['最初に裸地にコケが生えた状態','陽樹が生え始めた状態','草原の状態','森林が最終的に安定した状態（陰樹の森林）'],
   ex:'裸地→コケ→一年草→多年草→陽樹→陽樹＋陰樹の幼木→陰樹（<strong>極相</strong>）という流れで森林ができる。'},
  {id:'s1_15',stage:'s1',week:'2月1週',topic:'食物連鎖',
   q:'食物連鎖で個体数のつりあいが保たれているとき、草食動物が何らかの理由で増えたら？',
   a:'植物が減り、肉食動物が増える',
   opts:['植物が増え、肉食動物が減る','植物が減り、肉食動物が増える','何も変わらない','すべての生物が増える'],
   ex:'草食動物が増える→えさの植物が<strong>減る</strong>・肉食動物が<strong>増える</strong>→草食動物が減る→もとに戻る、という循環でつりあいが保たれる。'},

  // ════ 2月2週：生物と環境② ════
  {id:'s2_01',stage:'s2',week:'2月2週',topic:'外来種',
   q:'「帰化生物（外来種）」の植物の例として正しいのはどれですか？',
   a:'セイヨウタンポポ',
   opts:['カントウタンポポ','ニジマス','セイヨウタンポポ','ブナ'],
   ex:'外国から持ちこまれて日本に適応した生物を<strong>外来種（帰化生物）</strong>という。セイヨウタンポポは植物の外来種。カントウタンポポは在来種。'},
  {id:'s2_02',stage:'s2',week:'2月2週',topic:'外来種',
   q:'魚類の外来種として正しいのはどれですか？',
   a:'ブラックバス・ブルーギル',
   opts:['フナ・メダカ','ニジマス・ヒキガエル（ウシガエル）','ブラックバス・ブルーギル','コイ・タナゴ'],
   ex:'<strong>ブラックバス・ブルーギル</strong>は魚類の外来種。天敵がいなくて爆発的に増え、食物連鎖のつりあいを壊す。'},
  {id:'s2_03',stage:'s2',week:'2月2週',topic:'地球温暖化',

// ────────────────────────────────────────────
// ステージ設定
// ────────────────────────────────────────────
const STAGES = [
  {id:'s1',cls:'s1',name:'2月1週',sub:'生物と環境①',topic:'植物・森林・食物連鎖・物質循環',
   boss:'🌿 緑の支配者',bossName:'グリーンキング'},
  {id:'s2',cls:'s2',name:'2月2週',sub:'生物と環境②',topic:'環境問題・地球温暖化・生物個体数',
   boss:'🌍 環境の魔神',bossName:'エコロードｘ'},
  {id:'s3',cls:'s3',name:'2月3週',sub:'水溶液①',topic:'水溶液の性質・種類・溶解度',
   boss:'🧪 水溶液の魔王',bossName:'アクアデーモン'},
  {id:'s4',cls:'s4',name:'3月1週',sub:'水溶液②',topic:'中和反応・BTB液・塩',
   boss:'⚗️ 中和の大魔神',bossName:'ニュートラル'},
  {id:'s5',cls:'s5',name:'3月2週',sub:'水溶液③',topic:'金属と水溶液・水素・溶解',
   boss:'🔩 金属の鬼将軍',bossName:'メタルジェネラル'},
];

// ────────────────────────────────────────────
// ローカルストレージ
// ────────────────────────────────────────────
const LS_KEY_M = 'rika1ki_mastered';
const LS_KEY_I = 'rika1ki_incorrect';

function loadLS(){
  try{
    return {
      mastered: JSON.parse(localStorage.getItem(LS_KEY_M)||'[]'),
      incorrect: JSON.parse(localStorage.getItem(LS_KEY_I)||'[]'),
    };
  }catch(e){return {mastered:[],incorrect:[]};}
}
function saveLS(m,i){
  localStorage.setItem(LS_KEY_M, JSON.stringify(m));
  localStorage.setItem(LS_KEY_I, JSON.stringify(i));
}

// ────────────────────────────────────────────
// 状態
// ────────────────────────────────────────────
let state = {
  mode: 'home', // 'home'|'stage'|'weak'
  stageId: null,
  questions: [],
  qIndex: 0,
  score: 0,
  answered: false,
  mastered: [],
  incorrect: [],
};

// ────────────────────────────────────────────
// 初期化
// ────────────────────────────────────────────
function init(){
  const ls = loadLS();
  state.mastered = ls.mastered;
  state.incorrect = ls.incorrect;
  renderHome();
}

function shuffleArr(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ────────────────────────────────────────────
// ホーム描画
// ────────────────────────────────────────────
function renderHome(){
  document.getElementById('start').style.display='block';
  document.getElementById('battle').style.display='none';
  document.getElementById('clear').style.display='none';
  document.getElementById('homeBtn').style.display='none';

  const ls = loadLS();
  state.mastered = ls.mastered;
  state.incorrect = ls.incorrect;

  // stats
  document.getElementById('totalQ').textContent = QDB.length;
  document.getElementById('totalMastered').textContent = state.mastered.length;
  document.getElementById('totalWeak').textContent = state.incorrect.length;

  // weak btn
  const weakBtn = document.getElementById('weakBtn');
  if(state.incorrect.length>0){
    weakBtn.classList.remove('hidden');
    document.getElementById('weakCount').textContent = state.incorrect.length;
  }else{
    weakBtn.classList.add('hidden');
  }

  // stages
  const grid = document.getElementById('stageGrid');
  grid.innerHTML='';
  STAGES.forEach(st=>{
    const qs = QDB.filter(q=>q.stage===st.id);
    const masteredCount = qs.filter(q=>state.mastered.includes(q.id)).length;
    const pct = qs.length>0 ? Math.round(masteredCount/qs.length*100) : 0;
    const stars = pct===100?'⭐⭐⭐':pct>=60?'⭐⭐':pct>=30?'⭐':'';
    const card = document.createElement('div');
    card.className=`stage-card ${st.cls}`;
    card.innerHTML=`
      <div class="tag">${st.name}</div>
      <div class="title">${st.sub}</div>
      <div class="sub2">${st.topic}</div>
      <div class="prog">
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        <span style="font-size:11px;color:var(--text2)">${masteredCount}/${qs.length}</span>
      </div>
      ${stars?`<div class="stars">${stars}</div>`:''}
    `;
    card.onclick=()=>startStage(st.id);
    grid.appendChild(card);
  });
}

// ────────────────────────────────────────────
// ステージ開始
// ────────────────────────────────────────────
function startStage(stageId){
  const qs = QDB.filter(q=>q.stage===stageId);
  // 習得済みを後ろに、未習得・弱点を前に
  const weak = qs.filter(q=>state.incorrect.includes(q.id));
  const unlearned = qs.filter(q=>!state.mastered.includes(q.id)&&!state.incorrect.includes(q.id));
  const mastered = qs.filter(q=>state.mastered.includes(q.id)&&!state.incorrect.includes(q.id));
  const pool = [...shuffleArr(weak),...shuffleArr(unlearned),...shuffleArr(mastered)];

  const st = STAGES.find(s=>s.id===stageId);
  launchBattle(pool, st.name+' '+st.sub, st.bossName, st.boss, stageId);
}

function startWeak(){
  const weak = QDB.filter(q=>state.incorrect.includes(q.id));
  launchBattle(shuffleArr(weak),'弱点集中モード','⚔️ 全弱点','👹 ラスボス', 'weak');
}

function launchBattle(pool, title, bossName, bossFace, stageId){
  state.mode='battle';
  state.stageId=stageId;
  state.questions=pool;
  state.qIndex=0;
  state.score=0;

  document.getElementById('start').style.display='none';
  document.getElementById('battle').style.display='block';
  document.getElementById('clear').style.display='none';
  document.getElementById('homeBtn').style.display='block';
  document.getElementById('battleTitle').textContent=title;
  document.getElementById('enemyName').textContent=bossName;
  document.getElementById('enemyFace').textContent=bossFace;
  updateHP();
  showQ();
}

// ────────────────────────────────────────────
// 問題表示
// ────────────────────────────────────────────
function updateHP(){
  const total=state.questions.length;
  const remaining=total-state.qIndex;
  const pct=Math.round(remaining/total*100);
  document.getElementById('hpFill').style.width=pct+'%';
  document.getElementById('hpText').textContent=remaining+'/'+total;
  document.getElementById('qCounter').textContent=(state.qIndex+1)+'/'+total;
}

function showQ(){
  if(state.qIndex>=state.questions.length){showClear();return;}
  const q=state.questions[state.qIndex];
  state.answered=false;

  document.getElementById('qWeek').textContent=q.week;
  document.getElementById('qType').textContent=q.topic;
  document.getElementById('qText').textContent=q.q;
  document.getElementById('resultMsg').className='result-msg';
  document.getElementById('resultMsg').textContent='';
  document.getElementById('explainBox').className='explain-box';
  document.getElementById('nextBtn').className='next-btn';

  // choices
  const opts=shuffleArr(q.opts);
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.textContent=opt;
    btn.onclick=()=>answerQ(btn,opt,q);
    choicesEl.appendChild(btn);
  });

  updateHP();
}

// ────────────────────────────────────────────
// 解答処理
// ────────────────────────────────────────────
function answerQ(btn, chosen, q){
  if(state.answered)return;
  state.answered=true;

  // disable all
  document.querySelectorAll('.choice').forEach(b=>b.classList.add('disabled'));

  const correct = chosen===q.a;
  if(correct){
    btn.classList.add('correct');
    state.score++;
    // 正解：masteredに追加、incorrectから削除
    if(!state.mastered.includes(q.id)) state.mastered.push(q.id);
    state.incorrect=state.incorrect.filter(id=>id!==q.id);
    const rm=document.getElementById('resultMsg');
    rm.className='result-msg show ok';
    rm.textContent='⭐ 正解！';
    // shake enemy
    const face=document.getElementById('enemyFace');
    face.classList.add('shake');
    setTimeout(()=>face.classList.remove('shake'),300);
  }else{
    btn.classList.add('wrong');
    // 正解ボタンをハイライト
    document.querySelectorAll('.choice').forEach(b=>{
      if(b.textContent===q.a)b.classList.add('correct');
    });
    // incorrectに追加
    if(!state.incorrect.includes(q.id)) state.incorrect.push(q.id);
    // masteredから削除
    state.mastered=state.mastered.filter(id=>id!==q.id);
    const rm=document.getElementById('resultMsg');
    rm.className='result-msg show ng';
    rm.textContent='✗ 不正解…';
  }

  saveLS(state.mastered, state.incorrect);

  // 解説
  if(q.ex){
    const eb=document.getElementById('explainBox');
    eb.innerHTML='<strong>解説</strong>：'+q.ex;
    eb.className='explain-box show';
  }

  document.getElementById('nextBtn').className='next-btn show';
}

function nextQ(){
  state.qIndex++;
  showQ();
}

// ────────────────────────────────────────────
// クリア画面
// ────────────────────────────────────────────
function showClear(){
  const total=state.questions.length;
  const pct=Math.round(state.score/total*100);

  document.getElementById('battle').style.display='none';
  document.getElementById('clear').style.display='block';

  let emoji='😤',title='もう少し！',sub='弱点をもう一度やろう！';
  if(pct>=90){emoji='🏆';title='完璧！';sub='全問ほぼ正解！次のステージへ！';}
  else if(pct>=70){emoji='⭐';title='合格！';sub='もう少しで完璧だ！';}
  else if(pct>=50){emoji='💪';title='まあまあ！';sub='弱点集中モードで補強しよう。';}

  document.getElementById('clearEmoji').textContent=emoji;
  document.getElementById('clearTitle').textContent=title;
  document.getElementById('clearSub').textContent=sub;
  document.getElementById('scoreBig').textContent=state.score;
  document.getElementById('scoreLabel2').textContent='/ '+total+' 問（'+pct+'%）';
}

function retryStage(){
  if(state.stageId==='weak') startWeak();
  else if(state.stageId) startStage(state.stageId);
}

function goHome(){
  if(state.mode==='battle'){
    if(!confirm('ホームへ戻りますか？'))return;
  }
  state.mode='home';
  renderHome();
}

// ────────────────────────────────────────────
// スタート
// ────────────────────────────────────────────
init();
</script>
